<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#120c24" />
  <link rel="icon" href="/assets/favicon-pmi.png" type="image/png" />
  <title>管理后台 · PMI 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <main class="admin-hub-page">
    <div class="admin-hub">
      <div class="admin-hub__brand">PMI RISING LEADER 2026</div>
      <h1 class="admin-hub__title">管理后台</h1>
      <p class="admin-hub__sub">只读查看，不可修改或删除</p>

      <form class="admin-hub__gate" id="adminGate" hidden>
        <label class="admin-hub__gate-label" for="adminKey">访问密钥</label>
        <input class="admin-hub__gate-input" id="adminKey" type="password" autocomplete="off" placeholder="请输入密钥" />
        <button class="btn btn--lg btn--gradient btn--block" type="submit">进入</button>
        <p class="admin-hub__gate-hint" id="adminGateHint" hidden></p>
      </form>

      <nav class="admin-hub__tabs" id="adminTabs" hidden aria-label="管理分类">
        <button type="button" class="admin-hub__tab is-active" data-admin-tab="nominees">得奖人资料</button>
        <button type="button" class="admin-hub__tab" data-admin-tab="orders">购票订单</button>
      </nav>

      <section class="admin-hub__panel" id="adminPanelNominees" hidden>
        <p class="admin-hub__status" id="adminStatusNominees"></p>
        <div class="nom-admin__list" id="nomAdminList" hidden></div>
      </section>

      <section class="admin-hub__panel" id="adminPanelOrders" hidden>
        <p class="admin-hub__status" id="adminStatusOrders"></p>
        <div class="ord-admin__table-wrap" id="ordAdminTableWrap" hidden>
          <table class="ord-admin__table">
            <thead>
              <tr>
                <th>购票人</th>
                <th>公司 · 岗位</th>
                <th>票种</th>
                <th>类型</th>
                <th>金额</th>
                <th>购买时间</th>
                <th>订单号</th>
              </tr>
            </thead>
            <tbody id="ordAdminTbody"></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <div class="nom-admin-detail" id="nomAdminDetail" hidden>
    <div class="nom-admin-detail__mask" data-nom-admin-close></div>
    <div class="nom-admin-detail__panel" role="dialog" aria-modal="true" aria-labelledby="nomAdminDetailTitle">
      <button class="modal__x" type="button" aria-label="关闭" data-nom-admin-close>&times;</button>
      <h2 class="nom-admin-detail__title" id="nomAdminDetailTitle">得奖人详情</h2>
      <div class="nom-admin-detail__photo" id="nomAdminDetailPhoto" hidden>
        <img id="nomAdminDetailImg" alt="Nominee 照片" />
      </div>
      <div class="nom-admin-detail__photo" id="nomAdminDetailPosterWrap" hidden>
        <img id="nomAdminDetailPoster" alt="Nominee 专属海报" />
      </div>
      <div class="nom-admin-detail__rows" id="nomAdminDetailRows"></div>
    </div>
  </div>

  <script src="/js/admin.js"></script>
</body>
</html>
